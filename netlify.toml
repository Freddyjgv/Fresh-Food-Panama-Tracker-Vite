[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."renderQuotePdf"]
  included_files = [
    "public/brand/**"
  ]

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Authorization, Content-Type, Cache-Control, X-Requested-With, Accept"
    Access-Control-Allow-Methods = "GET, POST, PUT, PATCH, DELETE, OPTIONS"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 3000
  publish = "public" # IMPORTANTE: En dev usamos public para los _redirects
  framework = "#custom"

# ESTO ES LO QUE TE FALTA PARA EVITAR EL 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200